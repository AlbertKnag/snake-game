<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>🐍 贪吃蛇</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0f0f1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #fff;
      overflow: hidden;
    }

    h1 {
      font-size: 2rem;
      letter-spacing: 4px;
      margin-bottom: 12px;
      background: linear-gradient(90deg, #00ff88, #00cfff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: none;
    }

    #scoreboard {
      display: flex;
      gap: 32px;
      margin-bottom: 16px;
      font-size: 1rem;
      color: #aaa;
    }

    #scoreboard span {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    #scoreboard strong {
      font-size: 1.6rem;
      color: #fff;
    }

    #canvas-wrap {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 0 40px rgba(0, 255, 136, 0.2), 0 0 80px rgba(0, 207, 255, 0.1);
      border: 2px solid rgba(0, 255, 136, 0.3);
    }

    canvas {
      display: block;
      background: #111122;
    }

    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(10, 10, 26, 0.88);
      backdrop-filter: blur(4px);
      gap: 16px;
      transition: opacity 0.3s;
    }

    #overlay.hidden { display: none; }

    #overlay h2 {
      font-size: 2rem;
      background: linear-gradient(90deg, #ff6b6b, #ffd93d);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    #overlay p {
      color: #aaa;
      font-size: 0.95rem;
    }

    #overlay .final-score {
      font-size: 3rem;
      font-weight: bold;
      color: #00ff88;
    }

    button {
      padding: 12px 36px;
      font-size: 1rem;
      font-weight: bold;
      letter-spacing: 2px;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      background: linear-gradient(135deg, #00ff88, #00cfff);
      color: #0f0f1a;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 20px rgba(0, 255, 136, 0.4);
    }

    button:hover { transform: scale(1.05); box-shadow: 0 6px 28px rgba(0, 255, 136, 0.6); }
    button:active { transform: scale(0.97); }

    /* 移动端方向键 */
    #dpad {
      display: none;
      margin-top: 20px;
      gap: 0;
      flex-direction: column;
      align-items: center;
    }

    .dpad-row { display: flex; gap: 0; }

    .dpad-btn {
      width: 60px;
      height: 60px;
      font-size: 1.4rem;
      border-radius: 8px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.1s;
      padding: 0;
      box-shadow: none;
    }

    .dpad-btn:active { background: rgba(0, 255, 136, 0.25); }

    .dpad-spacer { width: 60px; height: 60px; }

    #level-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
      align-items: center;
      font-size: 0.85rem;
      color: #888;
    }

    #level-bar span { color: #00ff88; font-weight: bold; }

    @media (max-width: 520px) {
      h1 { font-size: 1.4rem; }
      #dpad { display: flex; }
    }

    @media (pointer: coarse) {
      #dpad { display: flex; }
    }
  </style>
</head>
<body>

<h1>🐍 贪吃蛇</h1>

<div id="scoreboard">
  <span>得分 <strong id="score">0</strong></span>
  <span>最高 <strong id="best">0</strong></span>
  <span>等级 <strong id="level">1</strong></span>
</div>

<div id="level-bar">速度：<span id="speed-label">慢</span></div>

<div id="canvas-wrap">
  <canvas id="c"></canvas>

  <div id="overlay">
    <h2 id="overlay-title">贪吃蛇</h2>
    <p id="overlay-sub">用方向键 / WASD 控制</p>
    <div class="final-score" id="final-score" style="display:none"></div>
    <button id="start-btn">开始游戏</button>
  </div>
</div>

<div id="dpad">
  <div class="dpad-row">
    <div class="dpad-spacer"></div>
    <button class="dpad-btn" data-dir="UP">▲</button>
    <div class="dpad-spacer"></div>
  </div>
  <div class="dpad-row">
    <button class="dpad-btn" data-dir="LEFT">◀</button>
    <div class="dpad-spacer"></div>
    <button class="dpad-btn" data-dir="RIGHT">▶</button>
  </div>
  <div class="dpad-row">
    <div class="dpad-spacer"></div>
    <button class="dpad-btn" data-dir="DOWN">▼</button>
    <div class="dpad-spacer"></div>
  </div>
</div>

<script>
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');

  // 响应式尺寸
  const CELL = 20;
  let COLS, ROWS;

  function resize() {
    const maxW = Math.min(window.innerWidth - 32, 500);
    const maxH = Math.min(window.innerHeight - 260, 500);
    COLS = Math.floor(maxW / CELL);
    ROWS = Math.floor(maxH / CELL);
    canvas.width = COLS * CELL;
    canvas.height = ROWS * CELL;
  }
  resize();

  // 游戏状态
  let snake, dir, nextDir, food, bonus, score, best, level, speed, running, animId, stepTimer;
  best = parseInt(localStorage.getItem('snake_best') || '0');
  document.getElementById('best').textContent = best;

  const SPEEDS = [180, 140, 110, 85, 65, 50]; // ms per step
  const SPEED_LABELS = ['慢', '普通', '快', '很快', '极快', '疯狂'];

  function initGame() {
    const cx = Math.floor(COLS / 2), cy = Math.floor(ROWS / 2);
    snake = [
      { x: cx, y: cy },
      { x: cx - 1, y: cy },
      { x: cx - 2, y: cy },
    ];
    dir = { x: 1, y: 0 };
    nextDir = { x: 1, y: 0 };
    score = 0;
    level = 1;
    speed = SPEEDS[0];
    running = true;
    bonus = null;
    placeFood();
    updateUI();
  }

  function placeFood() {
    let pos;
    do {
      pos = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
    } while (snake.some(s => s.x === pos.x && s.y === pos.y));
    food = pos;
  }

  function placeBonus() {
    if (bonus) return;
    let pos;
    do {
      pos = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
    } while (snake.some(s => s.x === pos.x && s.y === pos.y) || (food.x === pos.x && food.y === pos.y));
    bonus = { ...pos, ttl: 80 }; // 80 steps 后消失
  }

  function step() {
    if (!running) return;

    dir = { ...nextDir };
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

    // 穿墙
    head.x = (head.x + COLS) % COLS;
    head.y = (head.y + ROWS) % ROWS;

    // 撞自己
    if (snake.some(s => s.x === head.x && s.y === head.y)) {
      gameOver();
      return;
    }

    snake.unshift(head);

    let ate = false;
    if (head.x === food.x && head.y === food.y) {
      score += 10 * level;
      ate = true;
      placeFood();
      if (score % 50 === 0) placeBonus();
      // 升级
      const newLevel = Math.min(Math.floor(score / 100) + 1, SPEEDS.length);
      if (newLevel > level) {
        level = newLevel;
        speed = SPEEDS[level - 1];
        restartTimer();
      }
      updateUI();
    }

    if (bonus) {
      if (head.x === bonus.x && head.y === bonus.y) {
        score += 30 * level;
        bonus = null;
        ate = true;
        updateUI();
      } else {
        bonus.ttl--;
        if (bonus.ttl <= 0) bonus = null;
      }
    }

    if (!ate) snake.pop();

    draw();
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 网格（淡）
    ctx.strokeStyle = 'rgba(255,255,255,0.03)';
    ctx.lineWidth = 0.5;
    for (let x = 0; x <= COLS; x++) {
      ctx.beginPath(); ctx.moveTo(x * CELL, 0); ctx.lineTo(x * CELL, canvas.height); ctx.stroke();
    }
    for (let y = 0; y <= ROWS; y++) {
      ctx.beginPath(); ctx.moveTo(0, y * CELL); ctx.lineTo(canvas.width, y * CELL); ctx.stroke();
    }

    // 蛇身
    snake.forEach((seg, i) => {
      const ratio = i / snake.length;
      const r = Math.round(0 + ratio * 0);
      const g = Math.round(255 - ratio * 80);
      const b = Math.round(136 - ratio * 60);
      ctx.fillStyle = `rgb(${r},${g},${b})`;
      const pad = i === 0 ? 1 : 2;
      roundRect(ctx, seg.x * CELL + pad, seg.y * CELL + pad, CELL - pad * 2, CELL - pad * 2, i === 0 ? 6 : 4);
      ctx.fill();

      // 蛇头眼睛
      if (i === 0) {
        ctx.fillStyle = '#0f0f1a';
        const ex = dir.x === 0 ? [4, CELL - 6] : (dir.x > 0 ? [CELL - 6, CELL - 6] : [4, 4]);
        const ey = dir.y === 0 ? [4, 4] : (dir.y > 0 ? [CELL - 6, CELL - 6] : [4, 4]);
        ctx.beginPath(); ctx.arc(seg.x * CELL + ex[0], seg.y * CELL + ey[0], 2.5, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(seg.x * CELL + ex[1], seg.y * CELL + ey[1], 2.5, 0, Math.PI * 2); ctx.fill();
      }
    });

    // 食物（苹果）
    drawFood(food.x, food.y, '#ff4757', '🍎');

    // 奖励食物
    if (bonus) {
      const alpha = bonus.ttl < 20 ? bonus.ttl / 20 : 1;
      ctx.globalAlpha = alpha;
      drawFood(bonus.x, bonus.y, '#ffd93d', '⭐');
      ctx.globalAlpha = 1;
    }
  }

  function drawFood(x, y, color, emoji) {
    const cx = x * CELL + CELL / 2;
    const cy = y * CELL + CELL / 2;
    // 光晕
    const grd = ctx.createRadialGradient(cx, cy, 2, cx, cy, CELL * 0.8);
    grd.addColorStop(0, color + '88');
    grd.addColorStop(1, 'transparent');
    ctx.fillStyle = grd;
    ctx.beginPath(); ctx.arc(cx, cy, CELL * 0.8, 0, Math.PI * 2); ctx.fill();
    // emoji
    ctx.font = `${CELL - 4}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(emoji, cx, cy + 1);
  }

  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }

  function updateUI() {
    document.getElementById('score').textContent = score;
    document.getElementById('level').textContent = level;
    document.getElementById('speed-label').textContent = SPEED_LABELS[level - 1];
    if (score > best) {
      best = score;
      localStorage.setItem('snake_best', best);
      document.getElementById('best').textContent = best;
    }
  }

  function gameOver() {
    running = false;
    clearInterval(stepTimer);
    updateUI();

    const overlay = document.getElementById('overlay');
    document.getElementById('overlay-title').textContent = '游戏结束';
    document.getElementById('overlay-sub').textContent = score >= best ? '🎉 新纪录！' : '再试一次？';
    document.getElementById('final-score').style.display = 'block';
    document.getElementById('final-score').textContent = score + ' 分';
    document.getElementById('start-btn').textContent = '再来一局';
    overlay.classList.remove('hidden');
  }

  function startGame() {
    resize();
    document.getElementById('overlay').classList.add('hidden');
    document.getElementById('final-score').style.display = 'none';
    initGame();
    draw();
    restartTimer();
  }

  function restartTimer() {
    clearInterval(stepTimer);
    stepTimer = setInterval(step, speed);
  }

  // 键盘控制
  const KEY_MAP = {
    ArrowUp: 'UP', ArrowDown: 'DOWN', ArrowLeft: 'LEFT', ArrowRight: 'RIGHT',
    w: 'UP', s: 'DOWN', a: 'LEFT', d: 'RIGHT',
    W: 'UP', S: 'DOWN', A: 'LEFT', D: 'RIGHT',
  };

  document.addEventListener('keydown', e => {
    const d = KEY_MAP[e.key];
    if (d) {
      e.preventDefault();
      setDir(d);
    }
    if (e.key === ' ' || e.key === 'Enter') {
      if (!running) startGame();
    }
  });

  function setDir(d) {
    if (!running) return;
    const map = {
      UP:    { x: 0, y: -1 },
      DOWN:  { x: 0, y: 1 },
      LEFT:  { x: -1, y: 0 },
      RIGHT: { x: 1, y: 0 },
    };
    const nd = map[d];
    // 不能反向
    if (nd.x + dir.x === 0 && nd.y + dir.y === 0) return;
    nextDir = nd;
  }

  // 方向键按钮
  document.querySelectorAll('.dpad-btn').forEach(btn => {
    btn.addEventListener('touchstart', e => { e.preventDefault(); setDir(btn.dataset.dir); }, { passive: false });
    btn.addEventListener('mousedown', () => setDir(btn.dataset.dir));
  });

  // 触摸滑动
  let touchStart = null;
  canvas.addEventListener('touchstart', e => {
    touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  }, { passive: true });
  canvas.addEventListener('touchend', e => {
    if (!touchStart) return;
    const dx = e.changedTouches[0].clientX - touchStart.x;
    const dy = e.changedTouches[0].clientY - touchStart.y;
    if (Math.abs(dx) > Math.abs(dy)) {
      setDir(dx > 0 ? 'RIGHT' : 'LEFT');
    } else {
      setDir(dy > 0 ? 'DOWN' : 'UP');
    }
    touchStart = null;
  }, { passive: true });

  // 开始按钮
  document.getElementById('start-btn').addEventListener('click', startGame);

  // 初始绘制
  draw();

  // 自动控制逻辑
  let autoMode = false;
  let autoScore = 0;
  let autoMoves = 0;
  const AUTO_TARGET = 100; // 目标 100 分
  
  // 简单 AI：蛇头朝向食物
  function autoControl() {
    if (!running || !autoMode) return;
    
    const head = snake[0];
    const dx = food.x - head.x;
    const dy = food.y - head.y;
    
    // 选择最短路径，避免撞自己
    let newDir = { x: 0, y: 0 };
    
    if (Math.abs(dx) > Math.abs(dy)) {
      newDir.x = dx > 0 ? 1 : -1;
      newDir.y = 0;
    } else {
      newDir.x = 0;
      newDir.y = dy > 0 ? 1 : -1;
    }
    
    // 检查是否撞自己
    const testHead = { x: head.x + newDir.x, y: head.y + newDir.y };
    testHead.x = (testHead.x + COLS) % COLS;
    testHead.y = (testHead.y + ROWS) % ROWS;
    
    const willCollide = snake.some(s => s.x === testHead.x && s.y === testHead.y);
    
    if (!willCollide) {
      nextDir = newDir;
    } else {
      // 如果会撞，尝试其他方向
      const dirs = [{x:1,y:0}, {x:-1,y:0}, {x:0,y:1}, {x:0,y:-1}];
      for (const d of dirs) {
        if (d.x + dir.x === 0 && d.y + dir.y === 0) continue; // 不能反向
        const test = { x: head.x + d.x, y: head.y + d.y };
        test.x = (test.x + COLS) % COLS;
        test.y = (test.y + ROWS) % ROWS;
        const collide = snake.some(s => s.x === test.x && s.y === test.y);
        if (!collide) {
          nextDir = d;
          break;
        }
      }
    }
    
    autoMoves++;
  }
  
  // 修改游戏循环
  const originalStep = step;
  step = function() {
    if (!running) return;
    
    if (autoMode) {
      autoControl();
      autoScore = score;
    }
    
    originalStep();
    
    // 达到目标后停止
    if (autoMode && score >= AUTO_TARGET) {
      running = false;
      clearInterval(stepTimer);
      
      // 显示结果
      const overlay = document.getElementById('overlay');
      document.getElementById('overlay-title').textContent = '自动演示完成';
      document.getElementById('overlay-sub').textContent = `自动控制达到 ${AUTO_TARGET} 分`;
      document.getElementById('final-score').style.display = 'block';
      document.getElementById('final-score').textContent = score + ' 分';
      document.getElementById('start-btn').textContent = '重新开始';
      overlay.classList.remove('hidden');
      
      // 输出结果
      console.log(`🎮 自动演示完成！
得分: ${score}
等级: ${level}
移动次数: ${autoMoves}`);
    }
  };
  
  // 修改开始游戏
  const originalStartGame = startGame;
  startGame = function() {
    resize();
    document.getElementById('overlay').classList.add('hidden');
    document.getElementById('final-score').style.display = 'none';
    initGame();
    draw();
    restartTimer();
    
    // 自动开始
    setTimeout(() => {
      autoMode = true;
      console.log('🤖 开始自动演示...');
    }, 500);
  };
  
  // 修改键盘控制，在自动模式下禁用
  const originalSetDir = setDir;
  setDir = function(d) {
    if (!autoMode) originalSetDir(d);
  };
  
  // 页面加载后自动开始
  window.addEventListener('load', () => {
    setTimeout(() => {
      document.getElementById('start-btn').click();
    }, 1000);
  });
</script>
</body>
</html>
