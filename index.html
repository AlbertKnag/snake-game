<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Albert 的游戏</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: 'Segoe UI', 'PingFang SC', sans-serif;
}
.container { text-align: center; color: #fff; padding: 40px 20px; }
h1 { font-size: 36px; margin-bottom: 8px; }
p { color: rgba(255,255,255,0.6); margin-bottom: 40px; }
.cards { display: flex; gap: 24px; flex-wrap: wrap; justify-content: center; }
.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
  border-radius: 20px;
  padding: 20px;
  width: 260px;
  border: 1px solid rgba(255,255,255,0.1);
  text-decoration: none;
  color: #fff;
  transition: all 0.3s;
  display: block;
}
.card:hover { transform: translateY(-8px); box-shadow: 0 12px 40px rgba(0,0,0,0.4); }
.card .icon { font-size: 64px; display: block; margin-bottom: 12px; }
.card h2 { font-size: 20px; margin-bottom: 8px; }
.card .desc { font-size: 14px; color: rgba(255,255,255,0.5); }
</style>
</head>
<body>
<div class="container">
  <h1>🎮 Albert 的游戏</h1>
  <p>选一个想玩的游戏吧</p>
  <div class="cards">
    <a class="card" href="snake-game.html">
      <span class="icon">🐍</span>
      <h2>道具贪吃蛇</h2>
      <p class="desc">经典贪吃蛇 + 9种道具，点画布控制方向</p>
    </a>
    <a class="card" href="eggpary.html">
      <span class="icon">🥚</span>
      <h2>蛋仔派对·巅峰派对</h2>
      <p class="desc">平台竞速！和AI竞速闯关，3个赛道等你挑战</p>
    </a>
  </div>
</div>
</body>
</html>
