<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>蛋仔派对 - 巅峰派对</title>
<script src="https://unpkg.zhimg.com/three@0.128.0/build/three.min.js"></script>
<script>if(typeof THREE==='undefined'){document.write('<scr'+'ipt src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"><\/scr'+'ipt>');}</script>
<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-touch-callout:none;-webkit-user-select:none;touch-action:manipulation}
html,body{width:100%;height:100%;overflow:hidden;background:#1a1a2e;font-family:'PingFang SC','Microsoft YaHei',sans-serif}
#game-container{width:100%;height:100%}
canvas{display:block;width:100%!important;height:100%!important}
#hud{position:fixed;top:0;left:0;right:0;z-index:10;pointer-events:none;padding:10px 15px}
#hud-top{display:flex;justify-content:space-between;align-items:flex-start}
#round-info{background:rgba(0,0,0,.6);backdrop-filter:blur(8px);border-radius:12px;padding:6px 14px;color:#fff;font-size:13px;border:1px solid rgba(255,255,255,.15)}
#round-info .rnum{font-size:18px;font-weight:800;background:linear-gradient(135deg,#ffd700,#ff8c00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
#rank-list{background:rgba(0,0,0,.6);backdrop-filter:blur(8px);border-radius:10px;padding:5px 0;min-width:70px}
.rank-item{display:flex;align-items:center;padding:3px 12px;font-size:12px;color:#fff;gap:6px}
.rank-item .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;border:1px solid rgba(255,255,255,.3)}
.rank-item.elim{opacity:.4;text-decoration:line-through}
.rank-item .place{font-weight:700;color:#aaa;min-width:14px}
#elim-notice{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:20;pointer-events:none;font-size:42px;font-weight:900;color:#ff4444;text-shadow:0 4px 20px rgba(255,0,0,.6),0 0 40px rgba(255,0,0,.3);opacity:0;transition:opacity .3s}
#elim-notice.show{opacity:1}
#elim-notice .sub{font-size:16px;font-weight:600;color:#fff;text-shadow:0 2px 10px rgba(0,0,0,.8);display:block;text-align:center;margin-top:6px}
#item-hint{position:fixed;bottom:100px;right:50%;transform:translateX(50%);z-index:10;pointer-events:none;background:rgba(0,0,0,.7);border-radius:8px;padding:4px 12px;color:#ffd700;font-size:11px;opacity:0;transition:opacity .3s;white-space:nowrap}
#item-hint.show{opacity:1}
#controls{position:fixed;bottom:0;left:0;right:0;z-index:15;height:45%;pointer-events:none}
#controls>*{pointer-events:auto}
#joystick-area{position:absolute;left:30px;bottom:30px;width:130px;height:130px;border-radius:50%;background:rgba(255,255,255,.08);border:2px solid rgba(255,255,255,.15);backdrop-filter:blur(4px)}
#joystick-knob{position:absolute;top:50%;left:50%;width:50px;height:50px;border-radius:50%;background:rgba(255,255,255,.4);transform:translate(-50%,-50%);transition:transform .05s;box-shadow:0 0 20px rgba(255,255,255,.15)}
#right-controls{position:absolute;right:30px;bottom:50px;display:flex;flex-direction:column;gap:14px;align-items:center}
#item-btn{width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,#ff6b6b,#ee5a24);border:3px solid rgba(255,255,255,.3);color:#fff;font-size:26px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 15px rgba(238,90,36,.5);cursor:pointer;transition:transform .15s,box-shadow .15s;position:relative}
#item-btn:active{transform:scale(.88);box-shadow:0 2px 8px rgba(238,90,36,.3)}
#item-btn.has-item{animation:pulse-item 1s infinite}
@keyframes pulse-item{0%,100%{box-shadow:0 4px 15px rgba(238,90,36,.5)}50%{box-shadow:0 4px 30px rgba(238,90,36,.9)}}
#item-btn .badge{position:absolute;top:-5px;right:-5px;background:#2ed573;border-radius:8px;padding:1px 5px;font-size:10px;min-width:18px;text-align:center;color:#fff;border:2px solid #1a1a2e}
#jump-btn{width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,#7bed9f,#2ed573);border:3px solid rgba(255,255,255,.3);color:#fff;font-size:24px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 15px rgba(46,213,115,.5);cursor:pointer;transition:transform .15s}
#jump-btn:active{transform:scale(.88)}
#win-screen{position:fixed;top:0;left:0;right:0;bottom:0;z-index:100;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.7);backdrop-filter:blur(10px)}
#win-screen.show{display:flex}
#win-card{background:linear-gradient(135deg,#1a1a3e,#2d2d5e);border-radius:24px;padding:30px 40px;text-align:center;border:2px solid rgba(255,215,0,.4);box-shadow:0 20px 80px rgba(255,215,0,.2)}
#win-card .trophy{font-size:72px;display:block;margin-bottom:10px}
#win-card h2{color:#ffd700;font-size:28px;margin-bottom:4px;text-shadow:0 0 20px rgba(255,215,0,.3)}
#win-card p{color:#aaa;font-size:14px;margin-bottom:18px}
#win-card .egg-win{width:80px;height:80px;border-radius:50%;margin:10px auto;display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:900;color:#fff;border:3px solid #ffd700;box-shadow:0 0 30px rgba(255,215,0,.3)}
#play-again-btn{padding:10px 36px;border-radius:20px;border:none;background:linear-gradient(135deg,#ffd700,#ff8c00);color:#fff;font-size:16px;font-weight:700;cursor:pointer;transition:transform .2s;margin-top:8px}
#play-again-btn:active{transform:scale(.92)}
#countdown-overlay{position:fixed;top:0;left:0;right:0;bottom:0;z-index:50;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.5)}
#countdown-overlay.show{display:flex}
#countdown-text{font-size:120px;font-weight:900;color:#ffd700;text-shadow:0 0 60px rgba(255,215,0,.5);animation:count-pop .5s ease}
@keyframes count-pop{0%{transform:scale(2);opacity:0}50%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
#loading{position:fixed;top:0;left:0;right:0;bottom:0;z-index:200;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);flex-direction:column;gap:20px}
#loading .title{font-size:36px;font-weight:900;color:#ffd700;text-shadow:0 0 30px rgba(255,215,0,.3)}
#loading .sub{color:#888;font-size:14px}
#loading .bar{width:200px;height:4px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden}
#loading .bar-fill{height:100%;width:0%;background:linear-gradient(90deg,#ffd700,#ff8c00);border-radius:2px;transition:width .5s}
</style>
</head>
<body>
<div id="loading"><div class="title">🥚 蛋仔派对</div><div class="sub">巅峰派对 · 加载中...</div><div class="bar"><div class="bar-fill" id="load-bar"></div></div></div>
<div id="start-screen"><div class="title">🥚 蛋仔派对</div><div class="sub">巅峰派对</div><div class="start-btn" id="start-btn">⚡ 点击开始 ⚡</div><div class="hint">触碰画面操控·掉落即淘汰</div></div>
<div id="game-container"></div>
<div id="hud">
  <div id="hud-top">
    <div id="round-info"><span style="color:#999;font-size:11px">第 </span><span class="rnum" id="round-num">1</span><span style="color:#999;font-size:11px"> 轮</span><br><span style="color:#aaa;font-size:11px">剩余 <span id="alive-count">5</span> 人</span></div>
    <div id="rank-list"></div>
  </div>
</div>
<div id="elim-notice"><span id="elim-text">💀</span><span class="sub" id="elim-sub"></span></div>
<div id="item-hint" class="show">捡到道具后点击 🎁 使用</div>
<div id="controls">
  <div id="joystick-area"><div id="joystick-knob"></div></div>
  <div id="right-controls"><div id="jump-btn">⬆</div><div id="item-btn">🎁<span class="badge" id="item-badge" style="display:none">0</span></div></div>
</div>
<div id="countdown-overlay"><div id="countdown-text">3</div></div>
<div id="win-screen">
  <div id="win-card">
    <span class="trophy">🏆</span>
    <h2>冠军!</h2>
    <div class="egg-win" id="winner-egg" style="background:#ff6b6b">P1</div>
    <p id="winner-name">玩家获胜!</p>
    <div style="color:#666;font-size:12px;margin-bottom:10px" id="rounds-played">用时 0 轮</div>
    <button id="play-again-btn">再来一局 🎮</button>
  </div>
</div>

<script>
// ===== Three.js Scene =====
const container=document.getElementById('game-container');
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x1a1a2e);
scene.fog=new THREE.Fog(0x1a1a2e,20,50);
const camera=new THREE.PerspectiveCamera(45,window.innerWidth/window.innerHeight,.1,100);
camera.position.set(0,5,6);
camera.lookAt(0,0,0);
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.2;
container.appendChild(renderer.domElement);

// ===== Lighting =====
const ambient=new THREE.AmbientLight(0x404060,.5);
scene.add(ambient);
const sun=new THREE.DirectionalLight(0xffeedd,1);
sun.position.set(10,20,-5);
sun.castShadow=true;
sun.shadow.mapSize.width=1024;
sun.shadow.mapSize.height=1024;
sun.shadow.camera.near=.1;
sun.shadow.camera.far=40;
sun.shadow.camera.left=-15;
sun.shadow.camera.right=15;
sun.shadow.camera.top=15;
sun.shadow.camera.bottom=-15;
scene.add(sun);
const rim=new THREE.DirectionalLight(0x4488ff,.4);
rim.position.set(-10,5,10);
scene.add(rim);
const hemi=new THREE.HemisphereLight(0x88ccff,.2,.6);
scene.add(hemi);

// ===== Sky =====
const skyGeo=new THREE.SphereGeometry(100,32,32);
const skyMat=new THREE.ShaderMaterial({
  uniforms:{t:{value:0},c1:{value:new THREE.Color(0x0f0c29)},c2:{value:new THREE.Color(0x302b63)},c3:{value:new THREE.Color(0x24243e)}},
  vertexShader:'varying vec2 vUv;void main(){vUv=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1);}',
  fragmentShader:'uniform vec3 c1,c2,c3;varying vec2 vUv;void main(){vec3 col=mix(c1,c2,vUv.y);col=mix(col,c3,pow(vUv.y,3.));gl_FragColor=vec4(col,1);}',
  side:THREE.BackSide
});
const sky=new THREE.Mesh(skyGeo,skyMat);
scene.add(sky);

// ===== Orbit stars =====
const starCount=200;
const starPos=new Float32Array(starCount*3);
for(let i=0;i<starCount;i++){
  const r=8+Math.random()*20;
  const theta=Math.random()*Math.PI*2;
  const phi=Math.acos(2*Math.random()-1);
  starPos[i*3]=r*Math.sin(phi)*Math.cos(theta);
  starPos[i*3+1]=Math.abs(r*Math.cos(phi));
  starPos[i*3+2]=r*Math.sin(phi)*Math.sin(theta);
}
const starGeo=new THREE.BufferGeometry();
starGeo.setAttribute('position',new THREE.BufferAttribute(starPos,3));
const starMat=new THREE.PointsMaterial({color:0xffffff,size:.08,transparent:true,opacity:.6});
const stars=new THREE.Points(starGeo,starMat);
scene.add(stars);

// ===== Arena =====
const ARENA_RADIUS=7;
const arenaGroup=new THREE.Group();
const arenaMat=new THREE.MeshStandardMaterial({
  color:0x886644,roughness:.8,metalness:.1,
});
const topMat=new THREE.MeshStandardMaterial({
  color:0xccaa88,roughness:.6,metalness:.05,
});
// Checkered top
const checkerGroup=new THREE.Group();
const checkSize=.5;
const tilesXY=Math.ceil(ARENA_RADIUS*2/checkSize);
for(let i=-tilesXY;i<tilesXY;i++){
  for(let j=-tilesXY;j<tilesXY;j++){
    const x=i*checkSize+checkSize/2,y=j*checkSize+checkSize/2;
    if(Math.sqrt(x*x+y*y)>ARENA_RADIUS-.05)continue;
    const dark=(i+j)%2===0;
    const tile=new THREE.Mesh(
      new THREE.PlaneGeometry(checkSize-.04,checkSize-.04),
      new THREE.MeshStandardMaterial({
        color:dark?0xbb9977:0xddbb99,
        roughness:.7,metalness:.05,
      })
    );
    tile.position.set(x,.01,y);
    tile.rotation.x=-Math.PI/2;
    tile.receiveShadow=true;
    checkerGroup.add(tile);
  }
}
arenaGroup.add(checkerGroup);

// Base cylinder
const baseMat=new THREE.MeshStandardMaterial({color:0x665544,roughness:.9,side:THREE.DoubleSide});
const base=new THREE.Mesh(new THREE.CylinderGeometry(ARENA_RADIUS,ARENA_RADIUS,.06,64,1,true),baseMat);
base.position.y=-.03;
base.receiveShadow=true;
arenaGroup.add(base);

// Rim ring
const rimGeo=new THREE.TorusGeometry(ARENA_RADIUS,.12,8,48);
const rimMat2=new THREE.MeshStandardMaterial({color:0xffd700,roughness:.4,metalness:.7,emissive:0xffd700,emissiveIntensity:.3});
const rimRing=new THREE.Mesh(rimGeo,rimMat2);
rimRing.rotation.x=Math.PI/2;
rimRing.position.y=.04;
arenaGroup.add(rimRing);

// Glow posts around edge
const postMat=new THREE.MeshStandardMaterial({color:0x4488ff,emissive:0x4488ff,emissiveIntensity:.3});
for(let i=0;i<16;i++){
  const a=i/16*Math.PI*2;
  const post=new THREE.Mesh(new THREE.CylinderGeometry(.06,.08,.5,6),postMat);
  post.position.set(Math.cos(a)*(ARENA_RADIUS-.15),.25,Math.sin(a)*(ARENA_RADIUS-.15));
  arenaGroup.add(post);
  // small ring around top
  const ring2=new THREE.Mesh(new THREE.TorusGeometry(.1,.02,6,12),new THREE.MeshStandardMaterial({color:0x66aaff,emissive:0x4488ff,emissiveIntensity:.2}));
  ring2.position.set(Math.cos(a)*(ARENA_RADIUS-.15),.5,Math.sin(a)*(ARENA_RADIUS-.15));
  ring2.rotation.x=Math.PI/2;
  arenaGroup.add(ring2);
}

// Center decoration
const cenMat=new THREE.MeshStandardMaterial({color:0xffd700,roughness:.3,metalness:.8,emissive:0xffd700,emissiveIntensity:.1});
const cen=new THREE.Mesh(new THREE.CylinderGeometry(.15,.2,.08,16),cenMat);
cen.position.y=.04;
arenaGroup.add(cen);

scene.add(arenaGroup);
var glowRing=new THREE.Mesh(
  new THREE.RingGeometry(ARENA_RADIUS-.3,ARENA_RADIUS+.5,48),
  new THREE.MeshBasicMaterial({color:0x4488ff,transparent:true,opacity:.08,side:THREE.DoubleSide})
);
glowRing.rotation.x=-Math.PI/2;
glowRing.position.y=-.01;
scene.add(glowRing);

// ===== Items =====
class GameItem{
  constructor(type){
    this.type=type;
    this.active=true;
    const names={bomb:'🧨',spring:'🛞',speed:'⚡',shield:'🛡️'};
    this.display=names[type]||'❓';
    const colors={bomb:0xff4444,spring:0x44ff44,speed:0x4488ff,shield:0xffaa00};
    this.color=colors[type]||0xffffff;

    this.group=new THREE.Group();
    // Glow sphere
    const glowMat=new THREE.MeshStandardMaterial({
      color:this.color,emissive:this.color,emissiveIntensity:.4,transparent:true,opacity:.6
    });
    this.glow=new THREE.Mesh(new THREE.SphereGeometry(.35,12,12),glowMat);
    this.group.add(this.glow);
    // Core
    const coreMat=new THREE.MeshStandardMaterial({color:0xffffff,emissive:0xffffff,emissiveIntensity:.2});
    this.core=new THREE.Mesh(new THREE.SphereGeometry(.2,12,12),coreMat);
    this.group.add(this.core);
    // Ring
    const ringMat=new THREE.MeshStandardMaterial({color:this.color,emissive:this.color,emissiveIntensity:.2});
    this.ring=new THREE.Mesh(new THREE.TorusGeometry(.25,.04,8,16),ringMat);
    this.ring.rotation.x=Math.PI/2;
    this.group.add(this.ring);
    // Light
    const light=new THREE.PointLight(this.color,.3,3);
    this.group.add(light);
    this.light=light;

    this.group.position.y=.5;
    this.bobOffset=Math.random()*Math.PI*2;
  }
  setPos(x,z){
    this.group.position.x=x;
    this.group.position.z=z;
  }
  update(t){
    this.group.position.y=.4+Math.sin(t*2+this.bobOffset)*.15;
    this.ring.rotation.z=t+this.bobOffset;
    this.ring.rotation.x=Math.PI/2+Math.sin(t+this.bobOffset)*.3;
    this.glow.material.emissiveIntensity=.3+Math.sin(t*2+this.bobOffset)*.2;
  }
  dispose(){
    scene.remove(this.group);
  }
}

let items=[];
const ITEM_TYPES=['bomb','spring','speed','shield'];
const ITEM_COOLDOWN=6;
let itemTimer=0;

function spawnItem(){
  if(items.length>=3)return;
  const angle=Math.random()*Math.PI*2;
  const dist=1.5+Math.random()*(ARENA_RADIUS-2.5);
  const it=new GameItem(ITEM_TYPES[Math.floor(Math.random()*ITEM_TYPES.length)]);
  it.setPos(Math.cos(angle)*dist,Math.sin(angle)*dist);
  scene.add(it.group);
  items.push(it);
}

// ===== Particles =====
let parts=[];

function addParticles(pos,color,count,spd,life){
  const c=new THREE.Color(color);
  for(let i=0;i<count;i++){
    const p={
      x:pos.x,y:pos.y,z:pos.z,
      vx:(Math.random()-.5)*spd,vy:Math.random()*spd*.8+.2,vz:(Math.random()-.5)*spd,
      life:life||1,decay:.01+Math.random()*.02,
      size:.08+Math.random()*.12,color:c.clone()
    };
    parts.push(p);
  }
}

function tickParts(){
  parts=parts.filter(p=>{
    p.x+=p.vx;p.y+=p.vy;p.z+=p.vz;
    p.vy-=.015;
    p.life-=p.decay;
    return p.life>0;
  });
}
let partMesh=null;
function rebuildPartMesh(){
  if(!parts.length){if(partMesh){scene.remove(partMesh);partMesh.dispose();partMesh=null;}return;}
  const geo=new THREE.BufferGeometry();
  const pos=new Float32Array(parts.length*3);
  const col=new Float32Array(parts.length*3);
  const siz=new Float32Array(parts.length);
  for(let i=0;i<parts.length;i++){
    pos[i*3]=parts[i].x;pos[i*3+1]=parts[i].y;pos[i*3+2]=parts[i].z;
    col[i*3]=parts[i].color.r;col[i*3+1]=parts[i].color.g;col[i*3+2]=parts[i].color.b;
    siz[i]=parts[i].size*parts[i].life;
  }
  geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  geo.setAttribute('color',new THREE.BufferAttribute(col,3));
  geo.setAttribute('size',new THREE.BufferAttribute(siz,1));
  if(!partMesh){
    const mat=new THREE.PointsMaterial({size:.15,vertexColors:true,transparent:true,opacity:.8,sizeAttenuation:true,depthWrite:false});
    partMesh=new THREE.Points(geo,mat);
    scene.add(partMesh);
  }else{
    partMesh.geometry.dispose();
    partMesh.geometry=geo;
  }
}

// ===== Egg Character =====
const EGG_COLORS=[0xff6b6b,0x4ecdc4,0x45b7d1,0xf9ca24,0xa55eea];
const EGG_NAMES=[{cn:'草莓蛋仔',en:'Strawberry'},{cn:'薄荷蛋仔',en:'Mint'},{cn:'天空蛋仔',en:'Sky'},{cn:'太阳蛋仔',en:'Sunny'},{cn:'星空蛋仔',en:'Starry'}];
const PLAYER_ITEMS=[null,null,null,null,null];

class EggPlayer{
  constructor(id,color,name){
    this.id=id;
    this.color=color;
    this.name=name;
    this.alive=true;
    this.eliminated=false;
    this.x=0;this.z=0;
    this.vx=0;this.vz=0;
    this.radius=.55;
    this.speed=3.5;
    this.rotation=0;
    this.rollAngle=0;
    this.angularVel=0;
    this.jumpTimer=0;
    this.falling=false;
    this.item=null;
    this.shieldTimer=0;
    this.speedTimer=0;
    this.stunTimer=0;
    this.knockbackVx=0;
    this.knockbackVz=0;

    this.group=new THREE.Group();

    // Egg body
    const eggMat=new THREE.MeshStandardMaterial({
      color:color,roughness:.3,metalness:.4,
    });
    this.body=new THREE.Mesh(new THREE.SphereGeometry(.55,16,16),eggMat);
    this.body.scale.set(1,1.35,1);
    this.body.position.y=.5;
    this.body.castShadow=true;
    this.group.add(this.body);

    // Specular highlight strip
    const stripMat=new THREE.MeshStandardMaterial({
      color:color,roughness:.1,metalness:.6,emissive:color,emissiveIntensity:.05
    });
    const strip=new THREE.Mesh(new THREE.TorusGeometry(.4,.06,8,16),stripMat);
    strip.position.y=.5;
    strip.rotation.x=Math.PI/2.5;
    this.group.add(strip);

    // Eyes
    const eyeMat=new THREE.MeshStandardMaterial({color:0xffffff,roughness:.3});
    const pupilMat=new THREE.MeshStandardMaterial({color:0x222222,roughness:.5});
    for(let side of[-1,1]){
      const eye=new THREE.Mesh(new THREE.SphereGeometry(.12,10,10),eyeMat);
      eye.position.set(side*.18,.62,.45);
      this.group.add(eye);
      const pupil=new THREE.Mesh(new THREE.SphereGeometry(.06,8,8),pupilMat);
      pupil.position.set(side*.18,.62,.48);
      this.group.add(pupil);
    }

    // Mouth (cheerful smile)
    const mouthGeo=new THREE.TorusGeometry(.07,.02,6,12,Math.PI);
    const mouthMat=new THREE.MeshStandardMaterial({color:0x333333});
    const mouth=new THREE.Mesh(mouthGeo,mouthMat);
    mouth.position.set(0,.55,.52);
    mouth.rotation.x=-.2;
    this.group.add(mouth);

    // Blush
    for(let side of[-1,1]){
      const blush=new THREE.Mesh(
        new THREE.CircleGeometry(.07,8),
        new THREE.MeshBasicMaterial({color:this.color,transparent:true,opacity:.25})
      );
      blush.position.set(side*.3,.45,.42);
      this.group.add(blush);
    }

    // Shadow
    this.shadow=new THREE.Mesh(
      new THREE.CircleGeometry(.5,16),
      new THREE.MeshBasicMaterial({color:0x000000,transparent:true,opacity:.15,depthWrite:false})
    );
    this.shadow.rotation.x=-Math.PI/2;
    this.shadow.position.y=.01;
    this.group.add(this.shadow);

    // Shield effect
    this.shieldMesh=null;

    // Speed trail
    this.speedTrail=null;

    // Number label
    this.numberLabel=null;

    // Item indicator
    this.itemIndicator=null;

    scene.add(this.group);
  }

  useItem(players){
    if(!this.item)return false;
    const it=this.item;
    this.item=null;
    this.updateItemIndicator();
    switch(it){
      case'bomb':{
        // Explosion: push all nearby players away
        addParticles(new THREE.Vector3(this.x,.3,this.z),0xff4400,40,4,1.2);
        addParticles(new THREE.Vector3(this.x,.3,this.z),0xff8800,30,3,1);
        for(const p of players){
          if(p===this||!p.alive)continue;
          const dx=p.x-this.x,dz=p.z-this.z;
          const dist=Math.sqrt(dx*dx+dz*dz);
          if(dist<3){
            const force=5/(1+dist*.5);
            p.knockbackVx+=dx/dist*force;
            p.knockbackVz+=dz/dist*force;
            p.stunTimer=.3;
          }
        }
        // Self knockback
        this.knockbackVx+=(Math.random()-.5)*3;
        this.knockbackVz+=(Math.random()-.5)*3;
        this.stunTimer=.2;
        // Screen shake
        screenShake(.3);
        return true;
      }
      case'spring':{
        this.jumpTimer=.05;
        this.vy=7;
        addParticles(new THREE.Vector3(this.x,0,this.z),0x44ff44,20,2,.8);
        screenShake(.15);
        return true;
      }
      case'speed':{
        this.speedTimer=3;
        addParticles(new THREE.Vector3(this.x,.2,this.z),0x4488ff,10,1.5,.6);
        return true;
      }
      case'shield':{
        this.shieldTimer=4;
        this.updateShield();
        addParticles(new THREE.Vector3(this.x,.5,this.z),0xffaa00,15,1.5,.7);
        return true;
      }
    }
    return false;
  }

  updateShield(){
    if(this.shieldTimer>0&&!this.shieldMesh){
      const shieldMat=new THREE.MeshStandardMaterial({
        color:0xffaa00,emissive:0xffaa00,emissiveIntensity:.3,
        transparent:true,opacity:.2,wireframe:true
      });
      this.shieldMesh=new THREE.Mesh(new THREE.SphereGeometry(.7,12,12),shieldMat);
      this.shieldMesh.position.y=.5;
      this.group.add(this.shieldMesh);
    }else if(this.shieldTimer<=0&&this.shieldMesh){
      this.group.remove(this.shieldMesh);
      this.shieldMesh.geometry.dispose();
      this.shieldMesh.material.dispose();
      this.shieldMesh=null;
    }
    if(this.shieldMesh){
      this.shieldMesh.material.opacity=.15+Math.sin(Date.now()*.008)*.1;
    }
  }

  updateItemIndicator(){
    if(this.item&&!this.itemIndicator){
      const spr=document.createElement('div');
      spr.style.cssText='position:fixed;top:50%;left:50%;pointer-events:none;z-index:12;font-size:16px;transform:translate(-50%,-50%);background:rgba(0,0,0,.6);border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border:2px solid rgba(255,255,255,.2)';
      const names={bomb:'🧨',spring:'🛞',speed:'⚡',shield:'🛡️'};
      spr.textContent=names[this.id===0?PLAYER_ITEMS[0]:'']||'🎁';
      spr.id='pitem-ind';
      if(this.id===0){
        document.body.appendChild(spr);
        this.itemIndicator=spr;
      }
    }else if(!this.item&&this.itemIndicator){
      this.itemIndicator.remove();
      this.itemIndicator=null;
    }
  }

  setPos(x,z){
    this.x=x;this.z=z;
  }

  update(dt,players){
    if(!this.alive)return;
    this.updateShield();
    this.updateItemIndicator();

    if(this.stunTimer>0)this.stunTimer-=dt;
    if(this.speedTimer>0){
      this.speedTimer-=dt;
      // Speed trail particles
      if(Math.random()<.3)addParticles(new THREE.Vector3(this.x,.1,this.z),0x4488ff,1,1,.3);
    }
    if(this.shieldTimer>0)this.shieldTimer-=dt;

    const speedMul=this.speedTimer>0?1.8:1;
    const stunMul=this.stunTimer>0?.2:1;

    // Movement
    this.x+=this.vx*dt*speedMul*stunMul;
    this.z+=this.vz*dt*speedMul*stunMul;
    this.x+=this.knockbackVx*dt;
    this.z+=this.knockbackVz*dt;
    this.knockbackVx*=.94;
    this.knockbackVz*=.94;

    // Jump
    if(!this._vy)this._vy=0;
    if(this.jumpTimer>0){
      this._vy=5;
      this.jumpTimer-=dt;
    }
    this._vy-=.25;
    this.group.position.y+=this._vy*dt;
    if(this.group.position.y<.4){
      if(this._vy<-2){
        addParticles(new THREE.Vector3(this.x,0,this.z),this.color,3,1,.5);
      }
      this.group.position.y=.4;
      this._vy=0;
    }
    const actualY=this.group.position.y;

    // Rolling animation
    const moveSpeed=Math.sqrt(this.vx*this.vx+this.vz*this.vz);
    if(moveSpeed>.1){
      this.rotation=Math.atan2(this.vz,this.vx);
      this.rollAngle+=moveSpeed*dt*5*speedMul;
    }
    this.body.rotation.x=this.rollAngle;
    this.body.rotation.y=0;
    this.body.rotation.z=0;
    this.body.position.set(0,.5,0);
    this.group.rotation.y=-this.rotation;

    // Boundary check
    const dist=Math.sqrt(this.x*this.x+this.z*this.z);
    if(dist>ARENA_RADIUS-this.radius){
      if(actualY<=.41){
        this.x=this.x/dist*(ARENA_RADIUS-this.radius);
        this.z=this.z/dist*(ARENA_RADIUS-this.radius);
        this.vx*=.3;this.vz*=.3;
      }
      if(dist>ARENA_RADIUS+.5&&actualY<.5){
        this.falling=true;
        this.alive=false;
        this.eliminated=true;
        addParticles(new THREE.Vector3(this.x,actualY,this.z),this.color,20,3,1);
        return;
      }
    }

    // Shadow
    this.shadow.scale.set(1+.1*(1-actualY/.4),1,1+.1*(1-actualY/.4));
    this.shadow.material.opacity=.15-actualY*.01;

    // Group position
    this.group.position.x=this.x;
    this.group.position.z=this.z;

    // Speed trail
    if(this.speedTimer>0&&Math.random()<.15){
      addParticles(new THREE.Vector3(this.x,.1,this.z),0x4488ff,2,1.2,.4);
    }

    // Friction
    if(this.stunTimer<=0){
      this.vx*=.88;this.vz*=.88;
    }
    if(Math.abs(this.vx)<.01)this.vx=0;
    if(Math.abs(this.vz)<.01)this.vz=0;
  }
}

let players=[];
let state='countdown';
let roundNum=1;
let alivePlayers=[];
let eliminatedOrder=[];
let gameTime=0;
let shakeIntensity=0;
let shakeTime=0;

// ===== Spawn Positions =====
function getSpawnPos(idx,total){
  const a=idx/total*Math.PI*2-Math.PI/2;
  return {x:Math.cos(a)*(ARENA_RADIUS-1),z:Math.sin(a)*(ARENA_RADIUS-1)};
}

var threeReady=false;
function initGame(){
  if(!threeReady&&typeof THREE!=='undefined')threeReady=true;
  // Remove existing players
  players.forEach(p=>{scene.remove(p.group);});
  players=[];
  items.forEach(i=>{scene.remove(i.group);});
  items=[];
  parts=[];

  for(let i=0;i<5;i++){
    const pos=getSpawnPos(i,5);
    const p=new EggPlayer(i,EGG_COLORS[i],EGG_NAMES[i]);
    p.setPos(pos.x,pos.z);
    p.vx=0;p.vz=0;
    players.push(p);
    PLAYER_ITEMS[i]=null;
  }
  alivePlayers=players.slice();
  eliminatedOrder=[];
  roundNum=1;
  gameTime=0;

  // Reset items
  items=[];
  itemTimer=0;

  // Spawn initial items
  for(let i=0;i<2;i++)spawnItem();

  updateHUD();
  // start triggered by button
}

function startCountdown(){
  state='countdown';
  const overlay=document.getElementById('countdown-overlay');
  overlay.classList.add('show');
  let c=3;
  const el=document.getElementById('countdown-text');
  el.textContent=c;
  const int=setInterval(()=>{
    c--;
    if(c>0){
      el.textContent=c;
      el.style.animation='none';
      void el.offsetWidth;
      el.style.animation='count-pop .5s ease';
    }else if(c===0){
      el.textContent='GO!';
      el.style.color='#2ed573';
      el.style.animation='none';
      void el.offsetWidth;
      el.style.animation='count-pop .4s ease';
    }else{
      clearInterval(int);
      overlay.classList.remove('show');
      state='playing';
      el.style.color='#ffd700';
    }
  },800);
}

function checkRoundEnd(){
  const alive=players.filter(p=>p.alive&&!p.eliminated);
  const justDied=players.filter(p=>!p.alive&&!eliminatedOrder.includes(p.id));
  for(const p of justDied){
    eliminatedOrder.push(p.id);
    showElimination(p);
    // Drop egg
    const pos=p.group.position;
    addParticles(new THREE.Vector3(pos.x,pos.y,pos.z),p.color,30,3,1.2);
    // Fade out
    p.body.material.transparent=true;
    p.body.material.opacity=0;
  }

  if(alive.length<=1){
    if(alive.length===1){
      const winner=alive[0];
      showWin(winner);
      state='ended';
    }else{
      // All eliminated in same round? Last one standing wins
      const lastElim=eliminatedOrder[eliminatedOrder.length-1];
      const lastSurvivor=players.filter(p=>!eliminatedOrder.includes(p.id)&&p.alive);
      if(lastSurvivor.length){
        showWin(lastSurvivor[0]);
        state='ended';
      }else{
        // Truly all dead - restart round
        state='ended';
        setTimeout(()=>resetRound(),1500);
        showElimination(players[0]);
      }
    }
    return;
  }
  // Check if we should start next round
  // In Eggy Party, round ends when arena shrinks or timer runs out
  // Simplified: round ends when half are eliminated
  if(alive.length<=Math.ceil(players.filter(p=>!p.eliminated).length/2)&&roundNum<5){
    setTimeout(()=>nextRound(),1200);
  }
}

let screenShake=function(intensity){
  shakeIntensity=Math.max(shakeIntensity,intensity);
  shakeTime=.3;
};

function nextRound(){
  if(state==='ended')return;
  roundNum++;
  const surviving=players.filter(p=>p.alive&&!p.eliminated);
  // Teleport to new positions
  surviving.forEach((p,i)=>{
    p.knockbackVx=0;p.knockbackVz=0;p.vx=0;p.vz=0;
    p._vy=0;
    const pos=getSpawnPos(i,surviving.length);
    p.setPos(pos.x,pos.z);
    p.group.position.y=.4;
    p.item=null;
    p.speedTimer=0;
    p.shieldTimer=0;
    p.updateShield();
    p.updateItemIndicator();
  });
  // Clean up items
  items.forEach(i=>{scene.remove(i.group);});
  items=[];
  itemTimer=0;
  for(let i=0;i<2;i++)spawnItem();
  updateHUD();
  startCountdown();
  state='countdown';
}

function resetRound(){
  players.forEach(p=>{
    p.alive=true;
    p.eliminated=false;
    p.body.material.transparent=false;
    p.body.material.opacity=1;
    p.knockbackVx=0;p.knockbackVz=0;p.vx=0;p.vz=0;
    p._vy=0;
    p.group.position.y=.4;
    p.item=null;
    p.speedTimer=0;
    p.shieldTimer=0;
    p.updateShield();
    p.updateItemIndicator();
  });
  alivePlayers=players.slice();
  eliminatedOrder=[];
  roundNum=1;
  const alive=players.filter(p=>p.alive);
  alive.forEach((p,i)=>{
    const pos=getSpawnPos(i,alive.length);
    p.setPos(pos.x,pos.z);
  });
  items.forEach(i=>{scene.remove(i.group);});
  items=[];
  itemTimer=0;
  for(let i=0;i<2;i++)spawnItem();
  updateHUD();
  startCountdown();
}

// ===== AI =====
function updateAI(dt){
  players.forEach(p=>{
    if(p.id===0||!p.alive||p.stunTimer>0||state!=='playing')return;
    if(Math.random()<.02){
      setTimeout(()=>{
        if(p.item){
          const alive=players.filter(p2=>p2.alive&&p2.id!==p.id);
          if(alive.length){
            const closest=alive.reduce((a,b)=>{
              const da=(a.x-p.x)**2+(a.z-p.z)**2;
              const db=(b.x-p.x)**2+(b.z-p.z)**2;
              return da<db?a:b;
            });
            if(Math.sqrt((closest.x-p.x)**2+(closest.z-p.z)**2)<3){
              p.useItem(players);
            }
          }
        }
      },Math.random()*300);
    }
    if(!p.item&&Math.random()<.01){
      // Pick up nearby item
      items.forEach(it=>{
        if(!it.active)return;
        const dx=it.group.position.x-p.x;
        const dz=it.group.position.z-p.z;
        if(dx*dx+dz*dz<.8){
          p.item=it.type;
          it.active=false;
          scene.remove(it.group);
          items=items.filter(i=>i!==it);
        }
      });
    }
    // Strategic movement
    const distFromCenter=Math.sqrt(p.x*p.x+p.z*p.z);
    let targetX=0,targetZ=0;

    // Find nearest alive player to chase
    let nearest=null,nearestDist=999;
    players.forEach(p2=>{
      if(p2===p||!p2.alive||p2.eliminated)return;
      const d=(p2.x-p.x)**2+(p2.z-p.z)**2;
      if(d<nearestDist){nearestDist=d;nearest=p2;}
    });

    if(nearest&&nearestDist<9){
      // Chase nearest player
      targetX=nearest.x+(Math.random()-.5)*.5;
      targetZ=nearest.z+(Math.random()-.5)*.5;
    }else{
      // Move toward center
      targetX=(Math.random()-.5)*1.5;
      targetZ=(Math.random()-.5)*1.5;
    }

    // Avoid edge
    if(distFromCenter>ARENA_RADIUS-1.5){
      targetX=-p.x/distFromCenter*3;
      targetZ=-p.z/distFromCenter*3;
    }

    const dx=targetX-p.x;
    const dz=targetZ-p.z;
    const d=Math.sqrt(dx*dx+dz*dz);
    if(d>.1){
      p.vx+=dx/d*dt*8;
      p.vz+=dz/d*dt*8;
    }

    // Clamp speed
    const sp=Math.sqrt(p.vx*p.vx+p.vz*p.vz);
    if(sp>4){p.vx*=4/sp;p.vz*=4/sp;}

    // Random jump
    if(Math.random()<.003)p.jumpTimer=.05;
  });
}

// ===== Collision =====
function handleCollisions(){
  for(let i=0;i<players.length;i++){
    for(let j=i+1;j<players.length;j++){
      const a=players[i],b=players[j];
      if(!a.alive||!b.alive)continue;
      const dx=b.x-a.x,dz=b.z-a.z;
      const dist=Math.sqrt(dx*dx+dz*dz);
      const minDist=a.radius+b.radius;
      if(dist<minDist&&dist>.001){
        const push=(minDist-dist)/2;
        const nx=dx/dist,nz=dz/dist;
        // Push apart with velocity transfer
        if(!a.stunTimer||a.stunTimer<=0){
          a.x-=nx*push;
          a.z-=nz*push;
          a.vx-=nx*.5;
          a.vz-=nz*.5;
        }
        if(!b.stunTimer||b.stunTimer<=0){
          b.x+=nx*push;
          b.z+=nz*push;
          b.vx+=nx*.5;
          b.vz+=nz*.5;
        }
        // Collision particles
        if(Math.abs(a.vx)+Math.abs(a.vz)+Math.abs(b.vx)+Math.abs(b.vz)>.5){
          const mp={x:(a.x+b.x)/2,y:.3,z:(a.z+b.z)/2};
          addParticles(mp,0xffffff,2,.8,.3);
        }
      }
    }
  }
}

const jKnob=document.getElementById('joystick-knob');

jArea.addEventListener('touchstart',e=>{
  e.preventDefault();
  const t=e.changedTouches[0];
  jId=t.identifier;jActive=true;
  const rect=jArea.getBoundingClientRect();
  const cx=rect.left+rect.width/2,cy=rect.top+rect.height/2;

  updateJoystick(t.clientX,t.clientY,cx,cy);
});
jArea.addEventListener('touchmove',e=>{
  e.preventDefault();
  const t=Array.from(e.changedTouches).find(t=>t.identifier===jId);
  if(!t)return;
  const rect=jArea.getBoundingClientRect();
  const cx=rect.left+rect.width/2,cy=rect.top+rect.height/2;
  updateJoystick(t.clientX,t.clientY,cx,cy);
});
jArea.addEventListener('touchend',e=>{
  const t=Array.from(e.changedTouches).find(t=>t.identifier===jId);
  if(!t)return;
  jActive=false;jId=null;
  jDirX=0;jDirZ=0;
  jKnob.style.transition='transform .15s ease';
  jKnob.style.transform='translate(-50%,-50%)';
});
jArea.addEventListener('touchcancel',e=>{
  jActive=false;jId=null;
  jDirX=0;jDirZ=0;
  jKnob.style.transition='transform .15s ease';
  jKnob.style.transform='translate(-50%,-50%)';
});

function updateJoystick(tx,ty,cx,cy){
  const dx=(tx-cx)/(130/2),dy=(ty-cy)/(130/2);
  const d=Math.sqrt(dx*dx+dy*dy);
  const maxR=.4;
  if(d>maxR){
    jDirX=(dx/d)*maxR;
    jDirZ=(dy/d)*maxR;
  }else{
    jDirX=dx;jDirZ=dy;
  }
  jKnob.style.transform=`translate(${-50+jDirX*100}%,${-50+jDirZ*100}%)`;
}

// ===== Game Loop =====
let lastTime=0;
let animId=null;

function tick(time){
     animId=requestAnimationFrame(tick);
document.getElementById('start-btn').addEventListener('click',function(){  document.getElementById('start-screen').classList.remove('show');  startCountdown();});
document.addEventListener('keydown',function(e){if(e.key==='Enter'&&document.getElementById('start-screen').classList.contains('show')){document.getElementById('start-screen').classList.remove('show');startCountdown();}});
  if(!lastTime)lastTime=time;
  const dt=Math.min((time-lastTime)/1000,.05);
  lastTime=time;
  gameTime+=dt;

  // Shake
  if(shakeTime>0){
    shakeTime-=dt;
    camera.position.x=(Math.random()-.5)*shakeIntensity;
    camera.position.z=12+(Math.random()-.5)*shakeIntensity;
    shakeIntensity*=.94;
  }else{
    camera.position.x=0;
    camera.position.z=12;
  }

  // Keyboard input
  if(players[0]&&players[0].alive&&state==='playing'){
    let mx=0,mz=0;
    if(keys['ArrowUp']||keys['w']||keys['W'])mz=-1;
    if(keys['ArrowDown']||keys['s']||keys['S'])mz=1;
    if(keys['ArrowLeft']||keys['a']||keys['A'])mx=-1;
    if(keys['ArrowRight']||keys['d']||keys['D'])mx=1;
    if(!jActive){
      const kl=Math.sqrt(mx*mx+mz*mz);
      if(kl>.5){
        players[0].vx+=mx/kl*dt*8;
        players[0].vz+=mz/kl*dt*8;
      }
    }
    // Touch joystick
    if(jActive){
      players[0].vx+=jDirX*dt*12;
      players[0].vz+=jDirZ*dt*12;
    }
    // Clamp
    const sp=Math.sqrt(players[0].vx*players[0].vx+players[0].vz*players[0].vz);
    if(sp>5){players[0].vx*=5/sp;players[0].vz*=5/sp;}
  }

  // AI
  if(state==='playing')updateAI(dt);

  // Update players
  players.forEach(p=>p.update(dt,players));

  // Collisions
  handleCollisions();

  // Items
  itemTimer+=dt;
  if(itemTimer>=ITEM_COOLDOWN&&state==='playing'){
    itemTimer=0;
    spawnItem();
  }
  const t=time/1000;
  items.forEach((it,i)=>{
    it.update(t);
    // Check player pickup
    players.forEach(p=>{
      if(!p.alive||!it.active)return;
      const dx=it.group.position.x-p.x;
      const dz=it.group.position.z-p.z;
      if(dx*dx+dz*dz<.6&&!p.item){
        p.item=it.type;
        it.active=false;
        scene.remove(it.group);
        addParticles(new THREE.Vector3(it.group.position.x,.3,it.group.position.z),it.color,10,2,.7);
        document.getElementById('item-hint').classList.add('show');
        setTimeout(()=>document.getElementById('item-hint').classList.remove('show'),2000);
        items.splice(i,1);
      }
    });
  });
  items=items.filter(i=>i.active);

  // Particles
  tickParts();
  rebuildPartMesh();

  // Camera - 3rd person dynamic follow
  if(players[0]&&players[0].alive){
    var cx=players[0].x*-0.5;
    var cz=players[0].z*-0.3+5.5;
    camera.position.x+=(cx-camera.position.x)*0.08;
    camera.position.z+=(cz-camera.position.z)*0.08;
    camera.lookAt(players[0].x*0.3,0,players[0].z*0.3);
  }

  // HUD items
  updateHUDBadge();

  // Check round end
  if(state==='playing')checkRoundEnd();

  // Render
  renderer.render(scene,camera);
}

function updateHUDBadge(){
  const badge=document.getElementById('item-badge');
  const btn=document.getElementById('item-btn');
  if(players[0]&&players[0].item){
    badge.style.display='block';
    badge.textContent='1';
    btn.classList.add('has-item');
  }else{
    badge.style.display='none';
    btn.classList.remove('has-item');
  }
}

// ===== Resize =====
window.addEventListener('resize',()=>{
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});

// ===== Loading =====
// THREE is synchronous, update loading bar then show start
loadBar.style.width='100%';
setTimeout(function(){
  document.getElementById('loading').style.display='none';
  initGame();
  document.getElementById('start-screen').classList.add('show');
  animId=requestAnimationFrame(tick);
},500);
</script>
